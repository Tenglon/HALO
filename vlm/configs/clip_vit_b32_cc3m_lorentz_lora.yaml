# Example experiment config.

defaults:
  - base
  - _self_

data:
  format: "hf"
  dataset_name: "pingzhili/llava-filtered-cc3m-595k"
  dataset_config: null
  split: "train"
  image_column: "image"
  text_column: "caption"
  streaming: false
  image_size: 224
  tokenizer:
    provider: "transformers"
    name: "openai/clip-vit-base-patch32"
  num_workers: 8
  shuffle: true
  buffer_size: 1000
  max_text_len: 77
  pin_memory: true
  drop_last: true
  persistent_workers: true

model:
  hf_model_name: "openai/clip-vit-base-patch32"
  embed_dim: 512
  geometry: "lorentz"
  matching_score: "lorentz_inner_product"
  lorentz:
    enabled: true
    curv: 1.0
    learn_curv: false

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules: ["q_proj", "k_proj", "v_proj", "out_proj"]
  bias: "none"
  task_type: "FEATURE_EXTRACTION"

train:
  batch_size: 256
  lr: 1.0e-4
  wd: 0.01
  max_steps: 20000
  warmup: 1000
  grad_accum: 1
  precision: "bf16"
  seed: 42
